<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3545 Uniform St — Pocket Cards | Misane Properties</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0B1A48;--navy-text:#14224F;--brass:#B7843C;--gold:#D8A24E;--paper:#FAF8F3;--display:'Fraunces',Georgia,serif;--body:'Libre Franklin',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:#e9e7e1}
  .toolbar{max-width:8.5in;margin:14px auto 0;display:flex;justify-content:space-between;align-items:center}
  .toolbar .t{font-size:13px;color:#5F5E5A;max-width:60ch}
  .btn{font-family:var(--body);font-weight:600;font-size:14px;padding:10px 18px;border-radius:5px;border:none;cursor:pointer;background:var(--navy);color:#fff}
  .sheet{width:8.5in;min-height:11in;margin:14px auto;background:#fff;padding:0.5in;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:2in;gap:0}
  .card{border:1px dashed #cfc7b7;display:flex;align-items:center;gap:12px;padding:14px 16px}
  .card .l{flex:1}
  .card .k{font-family:var(--body);font-weight:600;text-transform:uppercase;letter-spacing:.14em;font-size:8px;color:var(--brass)}
  .card h3{font-family:var(--display);font-weight:600;color:var(--navy-text);font-size:15px;line-height:1.05;margin-top:3px}
  .card .meta{font-size:10.5px;color:#43474E;margin-top:4px}
  .card .price{font-family:var(--display);font-weight:600;color:var(--navy-text);font-size:13px;margin-top:5px}
  .card .u{font-size:10px;color:var(--brass);font-weight:600;margin-top:5px}
  .card .qr img{display:block;width:0.95in;height:0.95in}
  @media print{ body{background:#fff} .toolbar{display:none} .sheet{margin:0;width:auto;min-height:auto} .card{border:1px dashed #ddd} }
  @page{size:Letter;margin:0}
</style>
</head>
<body>
<div class="toolbar">
  <span class="t">Print on cardstock (Letter), then cut on the dashed lines — 10 cards. Pin to cork boards at gas stations, sport shops, cafés; hand to friends. Each scans to your site.</span>
  <button class="btn" onclick="window.print()">Save as PDF / Print</button>
</div>

<div class="sheet" id="sheet"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  var tmp = document.createElement('div')
  new QRCode(tmp, { text: "https://3545uniformst.com", width: 200, height: 200, colorDark: "#0B1A48", colorLight: "#ffffff" })
  setTimeout(function () {
    var img = tmp.querySelector('img') || tmp.querySelector('canvas')
    var src = img.tagName === 'IMG' ? img.src : img.toDataURL()
    var card = '<div class="card"><div class="l">' +
      '<div class="k">For Sale By Owner</div>' +
      '<h3>400± Acres Hunting Land + Cabin</h3>' +
      '<div class="meta">Sandstone, MN · whitetail, bear &amp; turkey · food plot</div>' +
      '<div class="price">$1,400,000</div>' +
      '<div class="u">3545UniformSt.com</div>' +
      '</div><div class="qr"><img src="' + src + '"></div></div>'
    document.getElementById('sheet').innerHTML = new Array(10).fill(card).join('')
  }, 250)
</script>
</body>
</html>
